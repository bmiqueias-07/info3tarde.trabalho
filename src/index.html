<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sibaúma Gamer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<div class="logo">
🎮
</div>

<h1>
Sibaúma Gamer
</h1>

<p>
Processo seletivo da mansão
</p>

</header>



<section class="card">


<h2>
👤 Cadastro do candidato
</h2>



<div class="foto">

<img id="preview"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">


<label>

Adicionar foto

<input 
type="file"
id="foto"
accept="image/*">

</label>


</div>



<form id="cadastro">


<div class="campo">

<label>
Nome completo
</label>

<input 
id="nome"
required>

</div>



<div class="campo">

<label>
Data de nascimento
</label>

<input
type="date"
id="nascimento"
required>

</div>



<div class="campo">

<label>
Idade
</label>

<input
id="idade"
readonly>

</div>



<div class="campo">

<label>
Nick / Nome de usuário
</label>

<input
id="nick"
required>

</div>



<div class="campo">

<label>
Email
</label>

<input
type="email"
id="email"
required>

</div>



<div class="campo">

<label>
Interesses
</label>

<textarea
id="interesses"
placeholder="Ex: Free Fire, streamer, edição...">
</textarea>

</div>




<div class="campo">

<label>
Ficha técnica
</label>

<textarea
id="ficha"
placeholder="Experiência, habilidades, campeonatos...">
</textarea>

</div>



<button>

Enviar candidatura

</button>



</form>


</section>




<section class="card status">


<h2>
📋 Minha candidatura
</h2>


<div id="resultado">

Nenhuma candidatura enviada

</div>


</section>





<section class="admin card">


<h2>
🛡️ Painel do Administrador
</h2>


<div id="perfilAdminn">

Nenhum candidato cadastrado.

</div>



</section>



</div>


<script src="app.js"></script>

</body>

</html>
